<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Melodia e um app de musica para descobrir artistas, montar playlists e ouvir tudo com mais clareza e menos complicacao.">
  <title>Melodia | Musica nova sem complicacao</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            night: "#090a0f",
            panel: "#11131a",
            panelAlt: "#151924",
            pulse: "#a855f7",
            electric: "#38bdf8",
            lime: "#bef264",
            mist: "#cbd5e1"
          },
          fontFamily: {
            display: ["Space Grotesk", "sans-serif"],
            body: ["Manrope", "sans-serif"]
          },
          boxShadow: {
            soft: "0 16px 40px rgba(0, 0, 0, 0.22)"
          },
          backgroundImage: {
            glow: "radial-gradient(circle at top left, rgba(168,85,247,0.10), transparent 28%), radial-gradient(circle at top right, rgba(56,189,248,0.08), transparent 24%)"
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="./src/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <script defer src="./src/js/script.js"></script>
</head>
<body class="bg-night bg-glow font-body text-white antialiased">
  <header></header>
  <main>
    <section id="home"></section>
    <section id="beneficios"></section>
    <section id="funcionalidades"></section>
    <section id="depoimentos"></section>
    <section id="contato"></section>
  </main>
  <footer></footer>
</body>
</html>
